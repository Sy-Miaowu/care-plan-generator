<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Care Plan Generator</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #f6f7f9;
        color: #1f2933;
      }

      main {
        max-width: 1040px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
      }

      .subtitle {
        margin: 0 0 28px;
        color: #52606d;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.9fr);
        gap: 24px;
        align-items: start;
      }

      form,
      .result {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        padding: 20px;
      }

      fieldset {
        border: 0;
        margin: 0 0 22px;
        padding: 0;
      }

      legend {
        margin-bottom: 12px;
        font-weight: 700;
        font-size: 16px;
      }

      label {
        display: block;
        margin-bottom: 12px;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        border: 1px solid #bcccdc;
        border-radius: 6px;
        font: inherit;
        font-weight: 400;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 6px;
        padding: 12px 16px;
        background: #0b69a3;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        background: #829ab1;
      }

      .result h2 {
        margin-top: 0;
      }

      pre {
        min-height: 520px;
        margin: 0;
        padding: 16px;
        overflow: auto;
        white-space: pre-wrap;
        border-radius: 6px;
        background: #f0f4f8;
        border: 1px solid #d9e2ec;
        font: 14px/1.5 Menlo, Consolas, monospace;
      }

      .error {
        display: none;
        margin: 0 0 14px;
        padding: 10px 12px;
        border-radius: 6px;
        background: #ffeeee;
        color: #9b1c1c;
      }

      @media (max-width: 820px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Care Plan Generator</h1>
      <p class="subtitle">Minimal MVP: submit patient/order details and queue a draft care plan request.</p>

      <div class="layout">
        <form id="care-plan-form">
          {% csrf_token %}

          <fieldset>
            <legend>Patient</legend>
            <label>
              First Name
              <input name="patient_first_name" value="Jane">
            </label>
            <label>
              Last Name
              <input name="patient_last_name" value="Doe">
            </label>
            <label>
              DOB
              <input name="dob" type="date" value="1975-04-12">
            </label>
            <label>
              MRN
              <input name="mrn" value="123456">
            </label>
          </fieldset>

          <fieldset>
            <legend>Provider</legend>
            <label>
              Referring Provider
              <input name="referring_provider" value="Dr. Smith">
            </label>
            <label>
              Referring Provider NPI
              <input name="referring_provider_npi" value="1234567890">
            </label>
          </fieldset>

          <fieldset>
            <legend>Clinical Info</legend>
            <label>
              Primary Diagnosis
              <input name="primary_diagnosis" value="M06.9">
            </label>
            <label>
              Additional Diagnoses
              <input name="additional_diagnoses" value="I10, E11.9">
            </label>
            <label>
              Medication Name
              <input name="medication_name" value="Humira">
            </label>
            <label>
              Medication History
              <textarea name="medication_history">Methotrexate, folic acid</textarea>
            </label>
            <label>
              Patient Records
              <textarea name="patient_records">Patient has rheumatoid arthritis with persistent joint pain and morning stiffness. Prior therapy response was incomplete.</textarea>
            </label>
          </fieldset>

          <p class="error" id="error-message"></p>
          <button id="submit-button" type="submit">Submit Care Plan Request</button>
        </form>

        <section class="result">
          <h2>Care Plan Request</h2>
          <pre id="care-plan-output">Submit the form to queue a care plan request.</pre>
        </section>
      </div>
    </main>

    <script>
      const form = document.getElementById("care-plan-form");
      const button = document.getElementById("submit-button");
      const output = document.getElementById("care-plan-output");
      const errorMessage = document.getElementById("error-message");
      let pollTimeoutId = null;

      function stopPolling() {
        if (pollTimeoutId) {
          clearTimeout(pollTimeoutId);
          pollTimeoutId = null;
        }
      }

      async function pollCarePlanStatus(carePlanId) {
        try {
          const response = await fetch(`/api/careplan/${carePlanId}/status/`, {
            cache: "no-store",
          });

          if (!response.ok) {
            throw new Error(`Status check failed with status ${response.status}`);
          }

          const data = await response.json();

          if (data.status === "completed") {
            stopPolling();
            output.textContent = data.content || "Care plan completed, but no content was returned.";
            button.disabled = false;
            button.textContent = "Submit Care Plan Request";
            return;
          }

          if (data.status === "failed") {
            stopPolling();
            errorMessage.textContent = data.error || "Care plan generation failed.";
            errorMessage.style.display = "block";
            output.textContent = "Care plan generation failed.";
            button.disabled = false;
            button.textContent = "Submit Care Plan Request";
            return;
          }

          output.textContent = `Care plan ID: ${data.id}\nStatus: ${data.status}\n\nGenerating care plan...`;
          pollTimeoutId = setTimeout(() => pollCarePlanStatus(carePlanId), 3000);
        } catch (error) {
          stopPolling();
          errorMessage.textContent = error.message;
          errorMessage.style.display = "block";
          output.textContent = "Could not check care plan status.";
          button.disabled = false;
          button.textContent = "Submit Care Plan Request";
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        stopPolling();

        button.disabled = true;
        button.textContent = "Submitting...";
        errorMessage.style.display = "none";
        output.textContent = "Submitting care plan request...";

        try {
          const response = await fetch("/api/care-plans/", {
            method: "POST",
            body: new FormData(form),
          });

          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const data = await response.json();
          output.textContent = `${data.message}\nCare plan ID: ${data.id}\nOrder ID: ${data.order_id}\nStatus: ${data.status}\n\nGenerating care plan...`;
          button.textContent = "Generating...";
          pollCarePlanStatus(data.id);
        } catch (error) {
          stopPolling();
          errorMessage.textContent = error.message;
          errorMessage.style.display = "block";
          output.textContent = "Care plan request failed.";
          button.disabled = false;
          button.textContent = "Submit Care Plan Request";
        }
      });
    </script>
  </body>
</html>
