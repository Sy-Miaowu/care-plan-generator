services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-careplans}"
      POSTGRES_USER: "${POSTGRES_USER:-careplans}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-careplans_dev_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careplans} -d ${POSTGRES_DB:-careplans}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-only-secret-key"
      POSTGRES_DB: "${POSTGRES_DB:-careplans}"
      POSTGRES_USER: "${POSTGRES_USER:-careplans}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-careplans_dev_password}"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
