services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-careplans}"
      POSTGRES_USER: "${POSTGRES_USER:-careplans}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-careplans_dev_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careplans} -d ${POSTGRES_DB:-careplans}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-only-secret-key"
      POSTGRES_DB: "${POSTGRES_DB:-careplans}"
      POSTGRES_USER: "${POSTGRES_USER:-careplans}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-careplans_dev_password}"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      CAREPLAN_QUEUE_NAME: "${CAREPLAN_QUEUE_NAME:-careplan_queue}"
      CAREPLAN_LLM_PROVIDER: "${CAREPLAN_LLM_PROVIDER:-mock}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A careplan_project worker --loglevel=info
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-only-secret-key"
      POSTGRES_DB: "${POSTGRES_DB:-careplans}"
      POSTGRES_USER: "${POSTGRES_USER:-careplans}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-careplans_dev_password}"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"
      CELERY_BROKER_URL: "${CELERY_BROKER_URL:-redis://redis:6379/0}"
      CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-redis://redis:6379/0}"
      CAREPLAN_QUEUE_NAME: "${CAREPLAN_QUEUE_NAME:-careplan_queue}"
      CAREPLAN_LLM_PROVIDER: "${CAREPLAN_LLM_PROVIDER:-mock}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4.1-mini}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
